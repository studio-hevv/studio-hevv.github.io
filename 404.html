<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>페이지를 찾을 수 없습니다 — Studio HEVV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f8f6;
      --text: #1a1a1a;
      --muted: #888;
      --border: #e0e0dc;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      padding: 0 24px;
    }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 0 60px;
    }

    .wordmark {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 64px;
    }

    .wordmark a {
      color: var(--text);
      text-decoration: none;
      border-bottom: none;
    }

    .code {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 16px;
    }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 12px;
    }

    p {
      color: var(--muted);
      font-size: 15px;
      margin-bottom: 32px;
    }

    a.home {
      font-size: 14px;
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
      transition: border-color 0.15s;
    }

    a.home:hover { border-color: var(--text); }

    footer {
      border-top: 1px solid var(--border);
      padding-top: 32px;
      margin-top: 64px;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <div class="wordmark"><a href="/">Studio HEVV</a></div>

    <div class="code">404</div>
    <h1>페이지를 찾을 수 없습니다.</h1>
    <p>요청하신 페이지가 존재하지 않거나 이동되었습니다.</p>

    <a class="home" href="/">홈으로 돌아가기</a>

    <footer>&copy; 2026 Studio HEVV</footer>
  </main>
</body>
</html>
