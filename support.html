<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Support — Studio HEVV</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f8f8f6;
      --text: #1a1a1a;
      --muted: #888;
      --border: #e0e0dc;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 16px;
      line-height: 1.7;
      padding: 0 24px;
    }

    main {
      max-width: 600px;
      margin: 0 auto;
      padding: 80px 0 60px;
    }

    .back {
      display: inline-block;
      font-size: 14px;
      color: var(--muted);
      text-decoration: none;
      margin-bottom: 48px;
      border-bottom: 1px solid transparent;
      transition: color 0.15s, border-color 0.15s;
    }

    .back:hover { color: var(--text); border-color: var(--text); }

    h1 {
      font-size: 22px;
      font-weight: 600;
      margin-bottom: 24px;
    }

    p { margin-bottom: 12px; }
    p:last-child { margin-bottom: 0; }

    a {
      color: var(--text);
      text-decoration: none;
      border-bottom: 1px solid var(--border);
    }

    a:hover { border-color: var(--text); }

    footer {
      border-top: 1px solid var(--border);
      padding-top: 32px;
      margin-top: 64px;
      font-size: 14px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <main>
    <a class="back" href="/">← Studio HEVV</a>

    <h1>Support</h1>

    <p>If you have questions, feedback, or run into any issues with our apps, we'd love to hear from you.</p>

    <p>Reach us at <a href="mailto:contact@studio-hevv.com">contact@studio-hevv.com</a> and we'll get back to you as soon as we can.</p>

    <footer>
      &copy; 2026 Studio HEVV
    </footer>
  </main>
</body>
</html>
